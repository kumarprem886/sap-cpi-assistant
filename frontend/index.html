<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/sap-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAP CPI Assistant</title>
    <script>
      // Restore path from 404.html GitHub Pages redirect
      (function(){
        var p = window.location.search.match(/[?&]p=([^&]*)/);
        if (p) {
          window.history.replaceState(null, null,
            window.location.pathname + '/' + decodeURIComponent(p[1]) +
            (window.location.search.match(/[?&]q=([^&]*)/) ? '?' + decodeURIComponent(window.location.search.match(/[?&]q=([^&]*)/)[1]) : '') +
            window.location.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
